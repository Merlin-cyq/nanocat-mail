<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoCat Mail</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<header>
    <div class="logo">
        NanoCat Mail
    </div>

    <nav>
        <a href="#features">功能</a>
        <a href="#apply">申请</a>
        <a href="about.html">关于</a>
    </nav>
</header>

<section class="hero">

    <div class="hero-content">

        <h1>NanoCat Mail</h1>

        <p class="subtitle">
            A Private Mail Community
        </p>

        <p class="description">
            一个属于朋友们的私人邮箱社区
            <br>
            基于 nanocat.xin 构建
        </p>

        <div class="buttons">
            <a href="#apply" class="btn primary">
                申请邮箱
            </a>

            <a href="#about" class="btn secondary">
                了解更多
            </a>
        </div>

    </div>

</section>

<section id="features" class="card-section">

    <h2>功能特色</h2>

    <div class="cards">

        <div class="card">
            <h3>私人社区</h3>
            <p>仅向朋友开放注册。</p>
        </div>

        <div class="card">
            <h3>专属域名</h3>
            <p>@nanocat.xin</p>
        </div>

        <div class="card">
            <h3>安全可靠</h3>
            <p>持续优化与维护。</p>
        </div>

    </div>

</section>

<section id="apply" class="card-section">

    <h2>邮箱申请</h2>

    <form id="applyForm">

        <input
            type="text"
            id="username"
            placeholder="邮箱前缀（例如 cyq）"
            required
        >

        <textarea
            id="reason"
            placeholder="申请理由"
            required
        ></textarea>

        <button type="submit">
            提交申请
        </button>

    </form>

    <div id="result"></div>

</section>

<section id="about" class="card-section">

    <h2>关于 NanoCat</h2>

    <p>
        NanoCat Mail 是一个面向朋友的小型邮箱社区。
        <br>
        目前仍在建设中。
    </p>

</section>

<footer>
    © 2026 NanoCat Mail
</footer>

<script src="script.js"></script>

</body>
</html>
