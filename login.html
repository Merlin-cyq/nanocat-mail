<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - NanoCat Mail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<header>
    <a href="index.html" class="logo">NanoCat Mail</a>
    <nav>
        <a href="index.html">首页</a>
        <a href="index.html#features">功能</a>
        <a href="apply.html">申请</a>
        <a href="about.html">关于</a>
        <a href="blog.html">博客</a>
        <a href="login.html" class="nav-btn-login active" id="loginBtn">登录</a>
    </nav>
</header>

<main class="login-page">
    <section class="login-card glass-card">
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">登录</button>
            <button class="auth-tab" data-tab="register">注册</button>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="login-form auth-panel active" data-panel="login">
            <label>
                邮箱地址
                <input id="loginEmail" type="email" placeholder="admin@nanocat.xin" autocomplete="email" required>
            </label>
            <label>
                密码
                <input id="loginPassword" type="password" placeholder="输入密码" autocomplete="current-password" required>
            </label>
            <div id="loginError" class="form-error"></div>
            <button class="btn primary" type="submit">登录</button>
            <p class="form-hint">登录后进入 NanoCat Mail</p>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="login-form auth-panel" data-panel="register">
            <label>
                邮箱地址
                <input id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" required>
            </label>
            <label>
                密码
                <input id="regPassword" type="password" placeholder="至少 6 位" autocomplete="new-password" required>
            </label>
            <label>
                确认密码
                <input id="regPassword2" type="password" placeholder="再次输入密码" autocomplete="new-password" required>
            </label>
            <div id="regError" class="form-error"></div>
            <button class="btn primary" type="submit">提交注册</button>
            <p class="form-hint">注册后需等待管理员审核通过</p>
        </form>

        <button class="logout-link" id="logoutButton" type="button">清除本地登录状态</button>
    </section>
</main>

<script src="script.js"></script>
<script>
// =============================================
// 登录/注册页面专用逻辑
// =============================================
const API_BASE = "/api";

document.addEventListener("DOMContentLoaded", () => {

  // ---------- Tab 切换 ----------
  document.querySelectorAll(".auth-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".auth-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".auth-panel").forEach(p => p.classList.remove("active"));
      document.querySelector(`.auth-panel[data-panel="${btn.dataset.tab}"]`).classList.add("active");
      document.getElementById("loginError").textContent = "";
      document.getElementById("regError").textContent = "";
    });
  });

  // ---------- 登录 ----------
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("loginError");
    errorEl.textContent = "";

    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;

    try {
      const res = await fetch(`${API_BASE}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { errorEl.textContent = data.error || "登录失败"; return; }

      // 存储 token 和用户信息
      localStorage.setItem("nanocat-token", data.token);
      localStorage.setItem("nanocat-account", JSON.stringify(data.user));
      window.location.href = "mail/index.html";
    } catch (err) {
      errorEl.textContent = "网络错误，请稍后重试";
    }
  });

  // ---------- 注册 ----------
  document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("regError");
    errorEl.textContent = "";

    const email = document.getElementById("regEmail").value.trim();
    const password = document.getElementById("regPassword").value;
    const password2 = document.getElementById("regPassword2").value;

    if (password !== password2) { errorEl.textContent = "两次密码不一致"; return; }
    if (password.length < 6) { errorEl.textContent = "密码至少 6 位"; return; }

    try {
      const res = await fetch(`${API_BASE}/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { errorEl.textContent = data.error || "注册失败"; return; }

      errorEl.style.color = "#22c55e";
      errorEl.textContent = data.message || "注册成功！请等待管理员审核。";
      document.getElementById("regEmail").value = "";
      document.getElementById("regPassword").value = "";
      document.getElementById("regPassword2").value = "";
    } catch (err) {
      errorEl.textContent = "网络错误，请稍后重试";
    }
  });

  // ---------- 清除登录状态 ----------
  document.getElementById("logoutButton").addEventListener("click", () => {
    localStorage.removeItem("nanocat-token");
    localStorage.removeItem("nanocat-account");
    window.location.reload();
  });
});
</script>
</body>
</html>
